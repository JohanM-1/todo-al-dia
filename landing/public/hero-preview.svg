<svg width="640" height="520" viewBox="0 0 640 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vista previa de TodoAlDía</title>
  <desc id="desc">Ilustración de la app con resumen financiero, movimientos y metas.</desc>
  <rect width="640" height="520" rx="40" fill="#F4E8DA"/>
  <rect x="376" y="54" width="210" height="412" rx="32" fill="#201614"/>
  <rect x="390" y="68" width="182" height="384" rx="24" fill="#FFFDF9"/>
  <rect x="414" y="92" width="134" height="14" rx="7" fill="#E5D4C4"/>
  <rect x="414" y="126" width="134" height="82" rx="20" fill="#B54D2F"/>
  <text x="430" y="154" fill="#FFFAF5" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Balance actual</text>
  <text x="430" y="186" fill="#FFFAF5" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">$ 482.300</text>
  <rect x="414" y="226" width="134" height="58" rx="18" fill="#F4E8DA"/>
  <text x="430" y="249" fill="#201614" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Supermercado</text>
  <text x="430" y="270" fill="#5E534D" font-family="Inter, Arial, sans-serif" font-size="12">Hoy · $ 32.450</text>
  <rect x="414" y="298" width="134" height="58" rx="18" fill="#F4E8DA"/>
  <text x="430" y="321" fill="#201614" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Sueldo</text>
  <text x="430" y="342" fill="#5E534D" font-family="Inter, Arial, sans-serif" font-size="12">Abril · +$ 850.000</text>
  <rect x="414" y="370" width="134" height="58" rx="18" fill="#F4E8DA"/>
  <text x="430" y="393" fill="#201614" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Meta del mes</text>
  <text x="430" y="414" fill="#5E534D" font-family="Inter, Arial, sans-serif" font-size="12">76% completado</text>
  <rect x="56" y="92" width="280" height="138" rx="28" fill="#FFFDF9" stroke="#D8C5B4"/>
  <text x="84" y="132" fill="#8F361D" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Registro por voz o texto</text>
  <text x="84" y="170" fill="#201614" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">"Cafe y subte 5.400"</text>
  <text x="84" y="202" fill="#5E534D" font-family="Inter, Arial, sans-serif" font-size="16">La app interpreta el movimiento y te pide solo lo que falta.</text>
  <rect x="56" y="258" width="148" height="124" rx="28" fill="#FFFDF9" stroke="#D8C5B4"/>
  <text x="80" y="294" fill="#201614" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Gastos del mes</text>
  <text x="80" y="336" fill="#201614" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">$ 367.700</text>
  <text x="80" y="362" fill="#5E534D" font-family="Inter, Arial, sans-serif" font-size="13">Comida, transporte y hogar</text>
  <rect x="220" y="258" width="116" height="124" rx="28" fill="#B54D2F"/>
  <text x="244" y="294" fill="#FFFAF5" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Meta</text>
