  <text x="244" y="362" fill="#FFFAF5" font-family="Inter, Arial, sans-serif" font-size="13">Ahorrado</text>
  <rect x="56" y="402" width="280" height="44" rx="22" fill="#201614"/>
  <text x="84" y="430" fill="#FFFAF5" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Menos friccion para registrar, mas claridad para decidir</text>
