# .github/workflows/e2e-test.yml
#
# E2E Testing with Patrol on Android Emulator.
#
# Triggers on PRs that touch lib/ or integration_test/.
# Note: GitHub-hosted runners lack hardware acceleration for Android emulators,
# making emulator performance poor. For production use, consider:
#   - Firebase Test Lab (gcloud firebase test android run)
#   - emulator.wtf (ew-cli) — faster cloud Android emulator
#   - BrowserStack / Sauce Labs device farms
name: E2E Tests (Patrol)

on:
  pull_request:
    paths:
      - 'lib/**'
      - 'integration_test/**'
  workflow_dispatch:  # Manual trigger

concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e-test:
    name: Patrol E2E on Android Emulator
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Install Patrol CLI
        run: |
          flutter pub global activate patrol_cli
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze

      - name: Build test bundle with Patrol
        run: |
          # Generate the Gradle wrapper first
          flutter build apk --debug --config-only
          patrol build android --tags integration

      - name: Start Android emulator
        id: emulator
        uses: matttaylor8910/android-emulator-action@v1
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          # Wipe data for a clean state
          wipe: true
          # Disable animation to speed up boot
          disable-animations: true

      - name: Wait for emulator to boot
        run: |
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
          adb shell settings put global window_animation_scale 0.0
          adb shell settings put global transition_animation_scale 0.0
          adb shell settings put global animator_duration_scale 0.0

      - name: Run Patrol E2E tests
        run: |
          patrol test \
            --tags integration \
            --project-root . \
            --verbose \
            2>&1 || true
        continue-on-error: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patrol-report
          path: |
            build/reports/patrol/
            integration_test/*.png
          retention-days: 14

      - name: Shutdown emulator
        if: always()
        run: adb emu kill
