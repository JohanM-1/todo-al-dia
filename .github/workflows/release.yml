name: Flutter Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Validate tag matches pubspec version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          PUBSPEC_SEMVER="${PUBSPEC_VERSION%%+*}"
          TAG_VERSION="${TAG_NAME#v}"

          echo "pubspec version: ${PUBSPEC_VERSION}"
          echo "tag version: ${TAG_VERSION}"

          if [ "${PUBSPEC_SEMVER}" != "${TAG_VERSION}" ]; then
            echo "Error: tag ${TAG_NAME} does not match pubspec.yaml version ${PUBSPEC_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Validate project
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter test

      - name: Build web release
        run: flutter build web --release

      - name: Publish web build branch
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web-build
          publish_dir: ./build/web
          force_orphan: true
          full_commit_message: 'chore: publish web build for ${{ github.ref_name }}'

      - name: Build Android APK release
        run: flutter build apk --release

      - name: Package web artifact
        run: cd build && zip -r web-release.zip web

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}-${{ github.run_number }}
          path: |
            build/web-release.zip
            build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/web-release.zip
            build/app/outputs/flutter-apk/app-release.apk
