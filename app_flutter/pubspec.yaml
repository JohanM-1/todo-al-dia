name: todoaldia
description: "App financiera personal con voz-first - MVP"
publish_to: 'none'
version: 0.1.3+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^13.0.0
  
  # Local Database (Hive - works on all platforms including web)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Voice
  speech_to_text: ^7.0.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # Utils
  uuid: ^4.2.2
  intl: ^0.20.2
  csv: ^6.0.0
  share_plus: ^7.2.1
  permission_handler: ^11.1.0
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_slidable: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.1
  patrol: ^4.3.0

patrol:
  test_directory: integration_test

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/
